<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Immoscout Monitor</h1>
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙</button>
    </div>

    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Idle</span>
    </div>

    <div class="last-check" id="lastCheck">Last check: Never</div>
    <div class="new-count" id="newCount">New since reset: 0</div>

    <div class="buttons">
      <button id="toggleBtn" class="btn primary">Start Monitoring</button>
      <button id="checkNowBtn" class="btn secondary">Check Now</button>
      <button id="resetBtn" class="btn secondary">Reset Count</button>
      <button id="testNotificationBtn" class="btn secondary">Test Notification</button>
      <button id="autoFillBtn" class="btn secondary">Auto-fill Form</button>
    </div>

    <div class="divider"></div>

    <div class="settings-section" id="settingsSection" style="display: none;">
      <h2>Settings</h2>

      <div class="setting-group">
        <label>Refresh Rate</label>
        <div class="range-row">
          <input type="range" id="refreshRate" min="30" max="600" step="30" value="180">
          <span id="refreshValue">3 min</span>
        </div>
      </div>

      <div class="setting-group">
        <label>Message Template</label>
        <textarea id="messageTemplate" rows="4" placeholder="Your message to the landlord..."></textarea>
      </div>

      <div class="divider"></div>

      <h2>Profile (for auto-fill)</h2>

      <div class="field-row">
        <div class="field">
          <label>Salutation</label>
          <select id="salutation">
            <option value="">Select...</option>
            <option value="MALE">Mister</option>
            <option value="FEMALE">Woman</option>
            <option value="COMPANY">Company</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="">
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="">
        </div>
      </div>

      <div class="field">
        <label>Street, Number, Postal Code, City</label>
        <input type="text" id="address" placeholder="e.g. Hauptstr. 10 10999 Berlin">
      </div>

      <div class="field-row">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="">
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Monthly Income (netto)</label>
          <input type="text" id="monthlyIncome" placeholder="e.g. 3000">
        </div>
        <div class="field">
          <label>Birth Year</label>
          <input type="number" id="birthYear" placeholder="e.g. 1990">
        </div>
      </div>

      <div class="field">
        <label>Occupation</label>
        <input type="text" id="occupation" placeholder="">
      </div>

      <div class="field-row">
        <div class="field">
          <label>Adults</label>
          <input type="number" id="numberOfAdults" min="1" value="1">
        </div>
        <div class="field">
          <label>Children</label>
          <input type="number" id="numberOfKids" min="0" value="0">
        </div>
      </div>

      <div class="field">
        <label>Pets</label>
        <select id="hasPets">
          <option value="">Select...</option>
          <option value="FALSE">No</option>
          <option value="TRUE">Yes</option>
        </select>
      </div>

      <div class="divider"></div>

      <h2>Telegram Notifications</h2>

      <div class="telegram-help">
        <a href="#" id="telegramHelp">How to set up?</a>
      </div>

      <div class="field">
        <label>Bot Token</label>
        <input type="text" id="telegramBotToken" placeholder="e.g. 123456:ABC-...">
      </div>

      <div class="field">
        <label>Chat ID</label>
        <input type="text" id="telegramChatId" placeholder="">
      </div>

      <div class="buttons">
        <button id="testTelegramBtn" class="btn secondary">Test Telegram</button>
      </div>

      <div class="divider"></div>

      <div class="buttons">
        <button id="saveSettings" class="btn primary">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
