<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Immoscout Monitor</h1>
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙</button>
    </div>

    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Idle</span>
    </div>

    <div class="last-check" id="lastCheck">Last check: Never</div>
    <div class="new-count" id="newCount">New since reset: 0</div>

    <div class="buttons">
      <button id="toggleBtn" class="btn primary">Start Monitoring</button>
      <button id="checkNowBtn" class="btn secondary">Check Now</button>
      <button id="resetBtn" class="btn secondary">Reset Count</button>
      <button id="testNotificationBtn" class="btn secondary">Test Notification</button>
    </div>

    <div class="divider"></div>

    <div class="settings-section" id="settingsSection" style="display: none;">
      <h2>Settings</h2>

      <div class="setting-group">
        <label>Refresh Rate</label>
        <div class="range-row">
          <input type="range" id="refreshRate" min="30" max="600" step="30" value="180">
          <span id="refreshValue">3 min</span>
        </div>
      </div>

      <div class="setting-group">
        <label>Message Template</label>
        <textarea id="messageTemplate" rows="4" placeholder="Your message to the landlord..."></textarea>
      </div>

      <div class="divider"></div>

      <h2>Profile (for auto-fill)</h2>

      <div class="field-row">
        <div class="field">
          <input type="text" id="firstName" placeholder="First Name">
        </div>
        <div class="field">
          <input type="text" id="lastName" placeholder="Last Name">
        </div>
      </div>

      <div class="field">
        <input type="text" id="address" placeholder="Current Address">
      </div>

      <div class="field-row">
        <div class="field">
          <input type="email" id="email" placeholder="Email">
        </div>
        <div class="field">
          <input type="tel" id="phone" placeholder="Phone">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <input type="text" id="monthlyIncome" placeholder="Monthly Income (netto)">
        </div>
        <div class="field">
          <input type="number" id="birthYear" placeholder="Birth Year">
        </div>
      </div>

      <div class="field">
        <input type="text" id="occupation" placeholder="Occupation">
      </div>

      <div class="field-row">
        <div class="field">
          <input type="number" id="numberOfAdults" placeholder="Adults" min="1">
        </div>
        <div class="field">
          <input type="number" id="numberOfKids" placeholder="Children" min="0">
        </div>
      </div>

      <div class="field">
        <select id="hasPets" style="width: 100%; padding: 8px 10px; background: #2a2a4a; border: 1px solid #3a3a5a; border-radius: 6px; color: #eee; font-size: 13px;">
          <option value="">Pets?</option>
          <option value="TRUE">Yes</option>
          <option value="FALSE">No</option>
        </select>
      </div>

      <div class="field">
        <select id="salutation" style="width: 100%; padding: 8px 10px; background: #2a2a4a; border: 1px solid #3a3a5a; border-radius: 6px; color: #eee; font-size: 13px;">
          <option value="">Salutation</option>
          <option value="MALE">Mister</option>
          <option value="FEMALE">Woman</option>
          <option value="COMPANY">Company</option>
        </select>
      </div>

      <div class="divider"></div>

      <h2>Telegram Notifications</h2>

      <div class="telegram-help">
        <a href="#" id="telegramHelp">How to set up?</a>
      </div>

      <div class="field">
        <input type="text" id="telegramBotToken" placeholder="Bot Token (e.g. 123456:ABC-...)">
      </div>

      <div class="field">
        <input type="text" id="telegramChatId" placeholder="Your Chat ID">
      </div>

<div class="buttons">
      <button id="resetBtn" class="btn secondary">Reset Count</button>
      <button id="testNotificationBtn" class="btn secondary">Test Notification</button>
      <button id="autoFillBtn" class="btn primary">Auto-fill Form</button>
    </div>

      <div class="divider"></div>

      <div class="buttons">
        <button id="saveSettings" class="btn primary">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
